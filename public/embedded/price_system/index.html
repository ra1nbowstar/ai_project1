    <script>
      (function () {
        try {
          if (new URLSearchParams(location.search).get('embed') !== '1') return
          document.documentElement.classList.add('portal-embed')
          function hideNav() {
            var el = document.querySelector('.top-navbar')
            if (el) {
              el.style.setProperty('display', 'none', 'important')
              return true
            }
            return false
          }
          function tightenLayout() {
            var wrap = document.querySelector('.content-wrapper')
            if (wrap) {
              wrap.style.setProperty('padding-top', '12px', 'important')
            }
          }
          function run() {
            if (hideNav()) {
              tightenLayout()
              return
            }
            var obs = new MutationObserver(function () {
              if (hideNav()) {
                tightenLayout()
                obs.disconnect()
              }
            })
            var root = document.body || document.documentElement
            obs.observe(root, { childList: true, subtree: true })
            setTimeout(function () {
              obs.disconnect()
            }, 8000)
          }
          if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', run)
          } else {
            run()
          }
        } catch (e) {}
      })()
    </script>
    <script>
      ;(() => {

        const rawAlert = window.alert ? window.alert.bind(window) : null

        function markSavedState() {
          const buttons = Array.from(document.querySelectorAll('button'))
          const saveBtn = buttons.find((btn) => (btn.textContent || '').trim().includes('确认保存'))
          if (saveBtn) {
            saveBtn.disabled = true
            saveBtn.textContent = '已保存'
          }

          const headers = Array.from(document.querySelectorAll('h1,h2,h3,h4,h5,div,span,p'))
          const sectionTitle = headers.find((el) =>
            (el.textContent || '').replace(/\s+/g, '').includes('识别结果确认'),
          )
          if (sectionTitle) {
            const cardLike = sectionTitle.closest('.card') || sectionTitle.parentElement
            if (cardLike) cardLike.classList.add('quote-result-saved-collapse')
          }
        }

        window.alert = function (msg) {
          const text = String(msg == null ? '' : msg)
          const ret = rawAlert(msg)
          if (/报价(写入)?成功|保存成功/.test(text)) {
            setTimeout(markSavedState, 0)
          }
          return ret
        }
      })()

    <script>
      ;(() => {
        // 线上/线下统一：历史代码若仍请求 /t1/*，自动改写为 /tl/*
        const rawFetch = window.fetch ? window.fetch.bind(window) : null
        if (rawFetch) {
          window.fetch = function (input, init) {
            let url = ''
            if (typeof input === 'string') url = input
            else if (input && typeof input.url === 'string') url = input.url
            if (url && /\/t1\//.test(url)) {
              const nextUrl = url.replace('/t1/', '/tl/')
              if (typeof input === 'string') return rawFetch(nextUrl, init)
              try {
                const req = new Request(nextUrl, input)
                return rawFetch(req, init)
              } catch (_) {
                return rawFetch(nextUrl, init)
              }
            }
            return rawFetch(input, init)
          }
        }

        const state = {
          currentSmelterEditId: null,
          currentWarehouseEditId: null,
          smelterRegionMap: new Map(),
          warehouseRegionMap: new Map(),
          smelterShipMap: new Map(),
          smelterShipLoaded: false,
          smelterShipPatchQueued: false,
        }

        /** 由「确认」拦截逻辑设置，用于可靠关闭当前弹层（避免 getElementById 命中 template 内重复 id） */
        let lastInterceptedModalConfirmBtn = null

        function pick(obj, keys) {
          if (!obj || typeof obj !== 'object') return ''
          for (const k of keys) {
            if (obj[k] != null) return String(obj[k]).trim()
          }
          return ''
        }

        function splitCnAddress(address) {
          const raw = String(address || '').trim().replace(/\s+/g, '')
          if (!raw) return { province: '', city: '', district: '' }
          let p = ''
          let c = ''
          let d = ''
          const muni = raw.match(/^(北京市|上海市|天津市|重庆市)/)
          if (muni) {
            const rest = raw.slice(muni[1].length)
            const dm = rest.match(/^(.*?(?:区|县|旗))/)
            return { province: muni[1], city: muni[1], district: dm ? dm[1] : '' }
          }
          let tmp = raw
          const pm = tmp.match(/^(.*?(?:省|自治区|特别行政区))/)
          if (pm) {
            p = pm[1]
            tmp = tmp.slice(p.length)
          }
          const cm = tmp.match(/^(.*?(?:市|自治州|地区|盟))/)
          if (cm) {
            c = cm[1]
            tmp = tmp.slice(c.length)
          }
          const dm = tmp.match(/^(.*?(?:区|县|旗))/)
          if (dm) d = dm[1]
          return { province: p, city: c, district: d }
        }

        function isRegionMissing(region) {
          return !(region && region.province && region.city && region.district)
        }

        async function refreshRegionMaps() {
          // 按需求关闭「库房管理/冶炼厂管理」里的自动查询接口调用
          return
        }

        /** 省市区静态数据（相对 embedded/price_system/ → 站点 base 下的 region/） */
        const REGION_PCA_JSON = '../../region/p-c-a.json'

        /** 库房表单省市区：与 public/region/p-c-a.json 一致 */
        let whPcaData = null
        let whPcaLoadPromise = null
        let whRegionFillSeq = 0
        let whRegionUserTouched = false
        let whRegionModalKey = ''

        /** 当前可见库房弹窗（避免 #modal-template 内重复 id 被 getElementById 误读） */
        function getActiveWarehouseModalOverlay() {
          const overlays = document.querySelectorAll('body > .modal-overlay')
          for (let i = overlays.length - 1; i >= 0; i--) {
            if (overlays[i].querySelector('#warehouse-name')) return overlays[i]
          }
          return null
        }

        function getWarehouseFormEl() {
          const ov = getActiveWarehouseModalOverlay()
          return ov ? ov.querySelector('#warehouse-form') : document.getElementById('warehouse-form')
        }

        function getWarehouseModalTitle() {
          const ov = getActiveWarehouseModalOverlay()
          if (!ov) return ''
          const h = ov.querySelector('.modal-header h3') || ov.querySelector('#modal-title')
          return (h?.textContent || '').trim()
        }

        function qWhRegion(id) {
          const form = getWarehouseFormEl()
          return form ? form.querySelector(`#${id}`) : document.getElementById(id)
        }

        function resetWarehouseRegionSessionForAdd() {
          state.currentWarehouseEditId = null
          whRegionUserTouched = false
          whRegionModalKey = 'add-wh-new'
          cancelWarehouseRegionScheduledFill()
        }

        const WH_REGION_NETWORK_HINT =
          '省市区加载失败，可能是网络问题，请刷新页面后再试。'
        let whRegionNetworkHintAt = 0
        let whRegionReadyCheckTimer = null

        function alertWhRegionNetworkError() {
          const now = Date.now()
          if (now - whRegionNetworkHintAt < 8000) return
          whRegionNetworkHintAt = now
          alert(WH_REGION_NETWORK_HINT)
        }

        function warehouseRegionInputsReady() {
          const form = getWarehouseFormEl()
          return !!(form && form.querySelector('#warehouse-province'))
        }

        function showWarehouseRegionNetworkTipInForm() {
          const form = getWarehouseFormEl()
          if (!form || warehouseRegionInputsReady()) return
          let tip = form.querySelector('#warehouse-region-network-tip')
          if (!tip) {
            tip = document.createElement('p')
            tip.id = 'warehouse-region-network-tip'
            tip.className = 'region-missing-tip'
            tip.style.marginTop = '6px'
            form.appendChild(tip)
          }
          tip.textContent = WH_REGION_NETWORK_HINT
          tip.style.display = 'block'
        }

        function hideWarehouseRegionNetworkTipInForm() {
          const tip = getWarehouseFormEl()?.querySelector('#warehouse-region-network-tip')
          if (tip) tip.style.display = 'none'
        }

        function scheduleWarehouseRegionReadyCheck() {
          if (whRegionReadyCheckTimer) clearTimeout(whRegionReadyCheckTimer)
          whRegionReadyCheckTimer = setTimeout(() => {
            whRegionReadyCheckTimer = null
            if (!getActiveWarehouseModalOverlay()) return
            if (warehouseRegionInputsReady()) {
              hideWarehouseRegionNetworkTipInForm()
              return
            }
            showWarehouseRegionNetworkTipInForm()
            alertWhRegionNetworkError()
          }, 10000)
        }

        async function ensureWhPcaLoaded() {
          if (whPcaData) return
          if (!whPcaLoadPromise) {
            whPcaLoadPromise = (async () => {
              const r = await fetch(REGION_PCA_JSON, { credentials: 'same-origin' })
              if (!r.ok) throw new Error(`加载省市区数据失败（HTTP ${r.status}）`)
              const data = await r.json()
              if (!Array.isArray(data)) throw new Error('省市区数据格式无效')
              whPcaData = data
            })()
          }
          try {
            await whPcaLoadPromise
          } catch (e) {
            whPcaLoadPromise = null
            throw e
          }
        }

        function findWhProvinceNode(name) {
          const n = (name || '').trim()
          if (!n || !whPcaData) return null
          const hit = whPcaData.find((p) => p.name === n)
          if (hit) return hit
          return whPcaData.find((p) => n.includes(p.name) || p.name.includes(n)) || null
        }

        function findWhCityNode(provNode, cityName) {
          const c = (cityName || '').trim()
          if (!provNode || !Array.isArray(provNode.children) || !c) return null
          const hit = provNode.children.find((x) => x.name === c)
          if (hit) return hit
          return provNode.children.find((x) => c.includes(x.name) || x.name.includes(c)) || null
        }

        function getWhProvinceNodeExact(name) {
          const n = (name || '').trim()
          if (!n || !whPcaData) return null
          return whPcaData.find((p) => p.name === n) || null
        }

        function getWhCityNodeExact(provNode, cityName) {
          const c = (cityName || '').trim()
          if (!provNode || !Array.isArray(provNode.children) || !c) return null
          return provNode.children.find((x) => x.name === c) || null
        }

        function isWhProvinceStandard(name) {
          return !!(name || '').trim() && !!getWhProvinceNodeExact(name)
        }

        function isWhCityStandard(provName, cityName) {
          const c = (cityName || '').trim()
          if (!c) return true
          const pn = getWhProvinceNodeExact(provName)
          if (!pn) return false
          return !!getWhCityNodeExact(pn, c)
        }

        function isWhDistStandard(provName, cityName, distName) {
          const d = (distName || '').trim()
          if (!d) return true
          const pn = getWhProvinceNodeExact(provName)
          const cn = getWhCityNodeExact(pn, cityName)
          if (!cn || !Array.isArray(cn.children)) return false
          return cn.children.some((x) => x.name === d)
        }

        function updateWarehouseRegionConflictUi() {
          const sp = qWhRegion('warehouse-province')
          const sc = qWhRegion('warehouse-city')
          const sd = qWhRegion('warehouse-district')
          const tip = qWhRegion('warehouse-region-pcd-conflict-tip')
          if (!sp || !sc || !sd) return
          const pv = (sp.value || '').trim()
          const cv = (sc.value || '').trim()
          const dv = (sd.value || '').trim()
          const cp = !!pv && !isWhProvinceStandard(pv)
          const cc = !!pv && !!cv && !isWhCityStandard(pv, cv)
          const cd = !!pv && !!cv && !!dv && !isWhDistStandard(pv, cv, dv)
          sp.classList.toggle('region-pcd-conflict', cp)
          sc.classList.toggle('region-pcd-conflict', cc)
          sd.classList.toggle('region-pcd-conflict', cd)
          if (tip) tip.style.display = cp || cc || cd ? 'block' : 'none'
        }

        function whFillSelectOptions(sel, placeholder, names, current) {
          if (!sel) return
          const uniq = [...new Set((names || []).filter(Boolean))]
          uniq.sort((a, b) => a.localeCompare(b, 'zh-CN'))
          const cur = (current || '').trim()
          if (cur && !uniq.includes(cur)) uniq.unshift(`${cur}`)
          sel.innerHTML = ''
          const o0 = document.createElement('option')
          o0.value = ''
          o0.textContent = placeholder
          sel.appendChild(o0)
          for (const nm of uniq) {
            const o = document.createElement('option')
            o.value = nm
            o.textContent = nm
            sel.appendChild(o)
          }
          sel.value = cur
        }

        function refreshWhRegionSelects(prefix, region) {
          const sp =
            prefix === 'warehouse' ? qWhRegion(`${prefix}-province`) : document.getElementById(`${prefix}-province`)
          const sc =
            prefix === 'warehouse' ? qWhRegion(`${prefix}-city`) : document.getElementById(`${prefix}-city`)
          const sd =
            prefix === 'warehouse' ? qWhRegion(`${prefix}-district`) : document.getElementById(`${prefix}-district`)
          if (!sp || !sc || !sd || !whPcaData) return
          const r = region || {}
          let pcdProv = (r.province || '').trim()
          let pcdCity = (r.city || '').trim()
          let pcdDist = (r.district || '').trim()
          const provNames = whPcaData.map((p) => p.name).filter(Boolean)
          whFillSelectOptions(sp, '请选择省份', provNames, pcdProv)
          const pv = pcdProv || (sp.value || '').trim()
          const provNode = findWhProvinceNode(pv)
          if (pcdCity && !getWhCityNodeExact(provNode, pcdCity)) pcdCity = ''
          const cityNames =
            provNode && Array.isArray(provNode.children) ? provNode.children.map((c) => c.name) : []
          whFillSelectOptions(sc, '请选择市', cityNames, pcdCity)
          const cv = pcdCity || (sc.value || '').trim()
          const cityNode = findWhCityNode(provNode, cv)
          if (pcdDist && !isWhDistStandard(pv, cv, pcdDist)) pcdDist = ''
          const distNames =
            cityNode && Array.isArray(cityNode.children) ? cityNode.children.map((d) => d.name) : []
          whFillSelectOptions(sd, '请选择区/县', distNames, pcdDist)
          updateWarehouseRegionConflictUi()
        }

        /** 每次弹窗新建 #warehouse-form 时重新绑定（避免 whPcdCascadeWired 导致二次打开无级联） */
        function wireWhPcdCascadesForForm() {
          const form = getWarehouseFormEl()
          if (!form || form.dataset.pcdCascadeWired === '1') return
          form.dataset.pcdCascadeWired = '1'
          form.addEventListener('change', (evt) => {
            const t = evt.target
            if (!t || t.tagName !== 'SELECT' || !whPcaData) return
            const sp = qWhRegion('warehouse-province')
            const sc = qWhRegion('warehouse-city')
            const sd = qWhRegion('warehouse-district')
            if (!sp || !sc || !sd) return
            if (t.id === 'warehouse-province') {
              onWarehouseRegionUserChange()
              const provNode = findWhProvinceNode(sp.value)
              const cityNames =
                provNode && Array.isArray(provNode.children)
                  ? provNode.children.map((c) => c.name)
                  : []
              whFillSelectOptions(sc, '请选择市', cityNames, '')
              whFillSelectOptions(sd, '请选择区/县', [], '')
              updateWarehouseRegionConflictUi()
              return
            }
            if (t.id === 'warehouse-city') {
              onWarehouseRegionUserChange()
              const provNode = findWhProvinceNode(sp.value)
              const cityNode = findWhCityNode(provNode, sc.value)
              const distNames =
                cityNode && Array.isArray(cityNode.children)
                  ? cityNode.children.map((d) => d.name)
                  : []
              whFillSelectOptions(sd, '请选择区/县', distNames, '')
              updateWarehouseRegionConflictUi()
              return
            }
            if (t.id === 'warehouse-district') {
              onWarehouseRegionUserChange()
              updateWarehouseRegionConflictUi()
            }
          })
        }

          if (Array.isArray(data.list)) return data.list

        /** 库房弹窗：优先当前下拉选中值；其次 map / data-w-prov（内嵌脚本写入） */
        function buildWarehouseRegionForFill() {
          const sp = qWhRegion('warehouse-province')
          const sc = qWhRegion('warehouse-city')
          const sd = qWhRegion('warehouse-district')
          if (sp && sc && sd) {
            const live = {
              province: (sp.value || '').trim(),
              city: (sc.value || '').trim(),
              district: (sd.value || '').trim(),
            }
            if (whRegionUserTouched || live.province || live.city || live.district) return live
          }
          const id = state.currentWarehouseEditId
          const fromMap =
            id != null && Number.isFinite(id) && state.warehouseRegionMap.has(id)
              ? state.warehouseRegionMap.get(id)
              : null
          if (fromMap && fromMap.province && fromMap.city && fromMap.district) return fromMap
          const wf = getWarehouseFormEl()
          if (!wf) return fromMap || { province: '', city: '', district: '' }
          const pv = String(
            (wf.dataset && wf.dataset.wProv) || wf.getAttribute('data-w-prov') || '',
          ).trim()
          const cy = String(
            (wf.dataset && wf.dataset.wCity) || wf.getAttribute('data-w-city') || '',
          ).trim()
          const ds = String(
            (wf.dataset && wf.dataset.wDist) || wf.getAttribute('data-w-dist') || '',
          ).trim()
          if (pv || cy || ds) return { province: pv, city: cy, district: ds }
          return fromMap || { province: '', city: '', district: '' }
        }

        let warehouseRegionHydrateSeq = 0

        /** 库房省市区 select 重绘 option 会触发 body 级 MutationObserver；若再次 schedule 会形成高频循环卡死主线程 */
        function mutationsLookLikeOnlyWarehouseRegionSelectRebuild(mutations) {
          if (!Array.isArray(mutations) || mutations.length === 0) return false
          return mutations.every((m) => {
            if (m.type !== 'childList') return false
            const t = m.target
            if (!(t instanceof HTMLSelectElement)) return false
            const id = t.id || ''
            return id === 'warehouse-province' || id === 'warehouse-city' || id === 'warehouse-district'
          })
        }

        async function hydrateWarehouseRegionFromApi() {
          if (whRegionUserTouched) return
          const seq = ++warehouseRegionHydrateSeq
          const id = state.currentWarehouseEditId
          const title = getWarehouseModalTitle()
          if (!Number.isFinite(id) || id <= 0) return
          if (!getActiveWarehouseModalOverlay()) return
          const isAddWarehouse = /新增/.test(title) && /库房/.test(title) && !/类型/.test(title)
          if (isAddWarehouse) return
          const paths = ['/tl/get_warehouses?include_inactive=true', '/tl/get_warehouses']
          for (const path of paths) {
            try {
              const json = await getJson(path)
              if (seq !== warehouseRegionHydrateSeq) return
              const rows = extractWarehouseRows(json)
              const row = rows.find((r) => {
                const wid = Number(pick(r, ['仓库id', 'id', 'warehouse_id']))
                return Number.isFinite(wid) && wid === id
              })
              if (!row) continue
              const region = warehouseRowPcd(row)
              if (!(region.province || region.city || region.district)) continue
              state.warehouseRegionMap.set(id, region)
              if (seq !== warehouseRegionHydrateSeq) return
              if (whRegionUserTouched) return
              if (!getActiveWarehouseModalOverlay()) return
              ensureRegionInputs('warehouse')
              wireWhPcdCascadesForForm()
              fillRegionInputs('warehouse', region)
              return
            } catch (_) {}
          }
        }

        function scheduleWarehouseRegionFill(force) {
          if (whRegionUserTouched && !force) return
          if (warehouseRegionHydrateTimer) clearTimeout(warehouseRegionHydrateTimer)
          const run = () => {
            if (whRegionUserTouched && !force) return
            ensureRegionInputs('warehouse')
            wireWhPcdCascadesForForm()
            fillRegionInputs('warehouse', buildWarehouseRegionForFill())
          }
          run()
          requestAnimationFrame(() => {
            if (whRegionUserTouched && !force) return
            run()
            setTimeout(run, 0)
            setTimeout(run, 80)
          })
          warehouseRegionHydrateTimer = setTimeout(() => {
            warehouseRegionHydrateTimer = null
            if (whRegionUserTouched && !force) return
            void hydrateWarehouseRegionFromApi()
          }, 120)
        }

        async function postJson(path, body) {
          const res = await fetch(path, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin',
            body: JSON.stringify(body),
          })
          const text = await res.text()
          let json = null
          try {
            json = text ? JSON.parse(text) : null
          } catch (_) {}
          if (!res.ok) {
            const msg = json && json.message ? json.message : text || `HTTP ${res.status}`
            throw new Error(msg)
          }
          return json
        }

        async function getJson(path) {
          const res = await fetch(path, { credentials: 'same-origin' })
          const text = await res.text()
          let json = null
          try {
            json = text ? JSON.parse(text) : null
          } catch (_) {}
          if (!res.ok) {
            const msg = json && json.message ? json.message : text || `HTTP ${res.status}`
            throw new Error(msg)
          }
          return json
        }

          if (Array.isArray(root.list)) return root.list
          if (Array.isArray(root.rows)) return root.rows

        async function refreshSmelterShipMap() {
          const paths = ['/tl/get_smelters?include_inactive=true', '/tl/get_smelters']
          for (const path of paths) {
            try {
              const json = await getJson(path)
              const rows = extractSmelterRows(json)
              if (!rows.length) continue
              state.smelterShipMap.clear()
              for (const row of rows) {
                const id = Number(pick(row, ['冶炼厂id', 'smelter_id', 'factory_id', 'id']))
                if (!Number.isFinite(id)) continue
                const ship = pick(row, ['循融宝发货', 'xunrongbao_ship', 'xrb_ship'])
                state.smelterShipMap.set(id, ship === '' ? '-' : ship)
              }
              state.smelterShipLoaded = true
              return

          }

          const body = { 冶炼厂id: id, 循融宝发货: !!enabled }
          const paths = ['/tl/set_smelter_xunrongbao']
          let lastErr = null
          for (const path of paths) {

              await postJson(path, body)

        function patchSmelterTableShipColumn() {
          const smBody = document.getElementById('smelter-table-body')
          if (!smBody) return
          const table = smBody.closest('table')
          if (!table) return

          const headerRows = table.querySelectorAll('thead tr')
          const lastHeader = headerRows[headerRows.length - 1]
          if (lastHeader && !lastHeader.querySelector('th[data-col="xrb-ship"]')) {
            const th = document.createElement('th')
            th.textContent = '循融宝发货'
            th.setAttribute('data-col', 'xrb-ship')
            const opTh = Array.from(lastHeader.children).find((n) => /操作/.test(n.textContent || ''))
            if (opTh) lastHeader.insertBefore(th, opTh)
            else lastHeader.appendChild(th)
          }

          const rows = smBody.querySelectorAll('tr')
          for (const tr of rows) {
            if (tr.querySelector('td[colspan]')) continue
            let td = tr.querySelector('td[data-col="xrb-ship"]')
            if (!td) {
              td = document.createElement('td')
              td.setAttribute('data-col', 'xrb-ship')
              const opTd = tr.querySelector('td .edit-btn')?.closest('td')
              if (opTd) tr.insertBefore(td, opTd)
              else tr.appendChild(td)
            }
            const editBtn = tr.querySelector('.edit-btn')
            const id = Number(editBtn?.getAttribute('data-id') || '')
            const rawText = Number.isFinite(id)
              ? (state.smelterShipMap.get(id) ?? (state.smelterShipLoaded ? '-' : '加载中...'))
              : '-'
            const shipText = String(rawText).trim().toLowerCase()
            const nextText =
              shipText === '1' || shipText === 'true'
                ? '是'
                : shipText === '0' || shipText === 'false'
                  ? '否'
                  : rawText
            if (td.textContent !== nextText) td.textContent = nextText

            const opTd = tr.querySelector('td .edit-btn')?.closest('td')
            if (opTd && !opTd.querySelector('.xrb-toggle-btn')) {
              const btn = document.createElement('button')
              btn.type = 'button'
              btn.className = 'btn btn-sm xrb-toggle-btn'
              btn.style.marginLeft = '6px'
              btn.setAttribute('data-id', String(id))
              btn.textContent = isShipEnabled(rawText) ? '设为否' : '设为是'
              opTd.appendChild(btn)
            }
            const toggleBtn = opTd?.querySelector('.xrb-toggle-btn')
            if (toggleBtn) {
              toggleBtn.setAttribute('data-id', String(id))
              toggleBtn.textContent = isShipEnabled(rawText) ? '设为否' : '设为是'
            }
          }
        }

            const payload = { 冶炼厂名: name, 地址: address }
            if (address) {
              const o = splitCnAddress(address)
              if (o.province) payload['省'] = o.province
              if (o.city) payload['市'] = o.city
              if (o.district) payload['区'] = o.district
            }
            if (editing) {
              payload['冶炼厂id'] = sidResolved
              payload['is_active'] = true
              const shipRaw = state.smelterShipMap.get(sidResolved)
              if (shipRaw !== undefined && shipRaw !== null && String(shipRaw).trim() !== '') {
                const s = String(shipRaw).trim().toLowerCase()
                if (s === '1' || s === 'true' || s === '是') payload['循融宝发货'] = true
                else if (s === '0' || s === 'false' || s === '否') payload['循融宝发货'] = false
              }
            }
            await postJson(editing ? '/tl/update_smelter' : '/tl/add_smelter', payload)
            closeModal()
            markMissingRows()
            if (typeof window.__tlRefreshSmeltersList === 'function') {
              await window.__tlRefreshSmeltersList()
              await refreshSmelterShipMap().finally(() => schedulePatchSmelterTableShipColumn())
            } else {
              const smInp = document.getElementById('smelter-search')
              if (smInp) setTimeout(() => smInp.dispatchEvent(new Event('input', { bubbles: true })), 0)
            }
            return true
          }

          if (title.includes('库房') || hasWarehouseForm) {
            const name = (document.getElementById('warehouse-name')?.value || '').trim()
            const address = (document.getElementById('warehouse-address')?.value || '').trim()
            const parsed = splitCnAddress(address)
            const province = (qWhRegion('warehouse-province')?.value || '').trim() || parsed.province
            const city = (qWhRegion('warehouse-city')?.value || '').trim() || parsed.city
            const district = (qWhRegion('warehouse-district')?.value || '').trim() || parsed.district
            const typeSel = document.getElementById('warehouse-type-select')
            const typeId = Number(typeSel?.value || '')
            const typeName = (typeSel?.selectedOptions?.[0]?.textContent || '')
              .replace(/^\[停用\]\s*/, '')
              .trim()
            if (!name) throw new Error('请填写库房名称')
            if (!address) throw new Error('请填写库房地址')
            if (!(province && city && district)) throw new Error('请从下拉列表选择完整的省、市、区')
            if (
              !isWhProvinceStandard(province) ||
              !isWhCityStandard(province, city) ||
              !isWhDistStandard(province, city, district)
            ) {
              throw new Error('省/市/区与标准行政区划不一致（见红色边框），请从下拉中改选标准项后再保存')
            }
            if (!Number.isFinite(typeId) || typeId <= 0) throw new Error('请先选择库房类型')
            const phoneRaw = (document.getElementById('warehouse-phone')?.value || '').trim()
            let phoneNorm = ''
            if (phoneRaw) {
              const phoneDigits = phoneRaw.replace(/\s+/g, '').replace(/-/g, '')
              if (!/^\d{11}$/.test(phoneDigits)) {
                throw new Error('电话填写时须为 11 位数字（可含空格或横线，保存时会去掉）')
              }
              phoneNorm = phoneDigits
            }
            // 拦截确认后内嵌脚本的 tt(id) 不会执行，必须在此区分新增/编辑；id 以 state 为准并回退到表单 data-tl-warehouse-id
            const isAddWarehouseTitle = /新增/.test(title) && /库房/.test(title) && !/类型/.test(title)
            const wfEl = getWarehouseFormEl()
            const widFromDataset = wfEl?.dataset?.tlWarehouseId != null ? Number(wfEl.dataset.tlWarehouseId) : NaN
            const widFromState =
              Number.isFinite(state.currentWarehouseEditId) && state.currentWarehouseEditId > 0
                ? state.currentWarehouseEditId
                : NaN
            const widResolved =
              !isAddWarehouseTitle && Number.isFinite(widFromState)
                ? widFromState
                : !isAddWarehouseTitle && Number.isFinite(widFromDataset) && widFromDataset > 0
                  ? widFromDataset
                  : NaN
            const isEditWarehouseTitle =
              (/编辑|編輯/.test(title) || (hasWarehouseForm && !isAddWarehouseTitle)) &&
              !isAddWarehouseTitle &&
              !/库房类型|类型维护/.test(title)
            const editing = isEditWarehouseTitle && Number.isFinite(widResolved) && widResolved > 0
            const readWarehouseOptNum = (id) => {
              const raw = (document.getElementById(id)?.value || '').trim()
              if (raw === '') return null
              const n = Number(raw)
              return Number.isFinite(n) ? n : null
            }
            const payload = {
              仓库名: name,
              地址: address,
              仓库类型id: typeId,
              库房类型名: typeName,
              省: province,
              市: city,
              区: district,
              库房联系人: (document.getElementById('warehouse-contact')?.value || '').trim(),
              电话: phoneNorm,
              危废经营许可数量: readWarehouseOptNum('warehouse-hazmat-permit-qty'),
              月均收货: readWarehouseOptNum('warehouse-monthly-inbound'),
            }
            if (editing) {
              payload['仓库id'] = widResolved
              payload['is_active'] = true
            }
            await postJson(editing ? '/tl/update_warehouse' : '/tl/add_warehouse', payload)
            closeModal()
            markMissingRows()
            const whBtn = document.getElementById('warehouse-search-btn')
            if (whBtn) setTimeout(() => whBtn.click(), 0)
            return true
          }

          lastInterceptedModalConfirmBtn = null
          return false
        }

        document.addEventListener(
          'click',
          (evt) => {
            const whAdd = evt.target.closest('#add-warehouse-btn')
            if (whAdd) {
              resetWarehouseRegionSessionForAdd()
            }
            const smEdit = evt.target.closest('#smelter-table-body .edit-btn')
            if (smEdit) {
              const id = Number(smEdit.getAttribute('data-id'))
              state.currentSmelterEditId = Number.isFinite(id) && id > 0 ? id : null
            }
            const whEdit = evt.target.closest('#warehouse-table-body .edit-btn')
            if (whEdit) {
              const id = Number(whEdit.getAttribute('data-id'))
              state.currentWarehouseEditId = Number.isFinite(id) && id > 0 ? id : null
              whRegionUserTouched = false
              whRegionModalKey = `edit-wh-${id}`
              cancelWarehouseRegionScheduledFill()
            }
          },
          true,
        )

        document.addEventListener(
          'click',
          async (evt) => {
            const btn = evt.target.closest('#smelter-table-body .xrb-toggle-btn')
            if (!btn) return
            const id = Number(btn.getAttribute('data-id') || '')
            if (!Number.isFinite(id)) return
            const currentRaw = state.smelterShipMap.get(id)
            const nextEnabled = !isShipEnabled(currentRaw)
            try {
              btn.disabled = true
              const old = btn.textContent
              btn.textContent = '处理中...'
              await setSmelterShipStatus(id, nextEnabled)
              schedulePatchSmelterTableShipColumn()
              btn.textContent = old || '更改状态'
            } catch (err) {
              alert(err instanceof Error ? err.message : String(err))
            } finally {
              btn.disabled = false
            }
          },
          true,
        )

        document.addEventListener(
          'click',
          async (evt) => {
            const btn =
              evt.target.closest('#modal-confirm') ||
              evt.target.closest('.modal.show .btn-primary') ||
              evt.target.closest('.modal .btn-primary')
            if (!btn) return
            const hasSmelterForm = !!document.getElementById('smelter-name')
            const hasWarehouseForm = !!document.getElementById('warehouse-name')
            if (!(hasSmelterForm || hasWarehouseForm)) return
            evt.preventDefault()
            evt.stopImmediatePropagation()
            lastInterceptedModalConfirmBtn = btn
            try {
              btn.disabled = true
              const old = btn.textContent
              btn.textContent = '处理中...'
              await handleCustomSave()
              btn.textContent = old || '确认'
              btn.disabled = false
            } catch (err) {
              lastInterceptedModalConfirmBtn = null
              btn.disabled = false
              btn.textContent = '确认'
              alert(err instanceof Error ? err.message : String(err))
            }
          },
          true,
        )

        const mo = new MutationObserver((mutations) => {
          const title = getWarehouseModalTitle()
          const hasSmelterForm = !!document.getElementById('smelter-name')
          const hasWarehouseForm = !!getActiveWarehouseModalOverlay()
          const wf = getWarehouseFormEl()
          const sf = document.getElementById('smelter-form')
          const isAddWarehouseTitle = /新增/.test(title) && /库房/.test(title) && !/类型/.test(title)
          const isAddSmelterTitle = /新增/.test(title) && /冶炼厂/.test(title)
          if (wf && isAddWarehouseTitle) {
            state.currentWarehouseEditId = null
            delete wf.dataset.tlWarehouseId
          } else if (
            wf &&
            (/编辑|編輯/.test(title) || (hasWarehouseForm && !isAddWarehouseTitle)) &&
            Number.isFinite(state.currentWarehouseEditId) &&
            state.currentWarehouseEditId > 0
          ) {
            wf.dataset.tlWarehouseId = String(state.currentWarehouseEditId)
          }
          if (sf && isAddSmelterTitle) {
            state.currentSmelterEditId = null
            delete sf.dataset.tlSmelterId
          } else if (
            sf &&
            hasSmelterForm &&
            !isAddSmelterTitle &&
            Number.isFinite(state.currentSmelterEditId) &&
            state.currentSmelterEditId > 0
          ) {
            sf.dataset.tlSmelterId = String(state.currentSmelterEditId)
          }
          const skipWarehouseRegionSchedule = mutationsLookLikeOnlyWarehouseRegionSelectRebuild(mutations)
          if ((title.includes('库房') || hasWarehouseForm) && !skipWarehouseRegionSchedule) {
            const modalKey = `${title}|${state.currentWarehouseEditId || 'new'}`
            if (modalKey !== whRegionModalKey) {
              whRegionModalKey = modalKey
              whRegionUserTouched = false
              cancelWarehouseRegionScheduledFill()
            }
            scheduleWarehouseRegionFill()
          }
          if (hasWarehouseForm) scheduleWarehouseRegionReadyCheck()
          markMissingRows()
          schedulePatchSmelterTableShipColumn()
        })

        function start() {
          mo.observe(document.body, { childList: true, subtree: true })
          markMissingRows()
          schedulePatchSmelterTableShipColumn()
          refreshSmelterShipMap().finally(() => schedulePatchSmelterTableShipColumn())
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', start)
        } else {
          start()
        }
      })()
    </script>

        const abnormalWhCache = new Map()

        /** 省市区树（REGION_PCA_JSON） */
        let abnormalPcaData = null
        let abnormalPcaLoadPromise = null
        let abnormalPcdCascadeWired = false

        function pick(obj, keys) {
          if (!obj || typeof obj !== 'object') return ''
          for (const k of keys) {
            if (obj[k] != null) return String(obj[k]).trim()
          }
          return ''
        }

        function pickNum(obj, keys) {
          const v = pick(obj, keys)
          const n = Number(v)
          return Number.isFinite(n) && n > 0 ? n : 0
        }

        function esc(s) {
          return String(s == null ? '' : s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
        }

        function getPcd(row) {
          return {
            prov: pick(row, ['省', '省份', 'province']),
            city: pick(row, ['市', '城市', 'city']),
            dist: pick(row, ['区', '区县', 'district', '县']),
          }
        }

        function isPcdIncomplete(p) {
          return !(p.prov && p.city && p.dist)
        }

        function hasMissingCoords(row) {
          const lat = pick(row, ['纬度', 'lat', 'latitude'])
          const lng = pick(row, ['经度', 'lng', 'lon', 'longitude'])
          return !lat || !lng
        }

        function isAbnormalRow(row) {
          return isPcdIncomplete(getPcd(row)) || hasMissingCoords(row)
        }

        function getMissingFieldsText(row) {
          const missing = []
          const pcd = getPcd(row)
          if (!pcd.prov) missing.push('省')
          if (!pcd.city) missing.push('市')
          if (!pcd.dist) missing.push('区')
          const lat = pick(row, ['纬度', 'lat', 'latitude'])
          const lng = pick(row, ['经度', 'lng', 'lon', 'longitude'])
          if (!lat) missing.push('纬度')
          if (!lng) missing.push('经度')
          return missing.length ? missing.join('、') : '-'
        }

        function isDefaultWarehouseName(name) {
          const n = String(name || '').trim()
          return n === '默认仓库' || n.includes('默认仓库')
        }

        function isDefaultSmelterName(name) {
          const n = String(name || '').trim()
          return n === '默认冶炼厂' || n.includes('默认冶炼厂')
        }

        function filterAbnormalPcdRows(warehouses, smelters) {
          const whRows = (warehouses || []).filter((row) => {
            const name = pick(row, ['仓库名', '仓库', 'warehouse_name', 'name'])
            if (isDefaultWarehouseName(name)) return false
            return isAbnormalRow(row)
          })
          const smRows = (smelters || []).filter((row) => {
            const name = pick(row, ['冶炼厂', '冶炼厂名', 'factory_name', 'name'])
            if (isDefaultSmelterName(name)) return false
            return isAbnormalRow(row)
          })
          return { whRows, smRows }
        }

        /** 常见形态：{ data: { warehouses, smelters, summary } } 或 { result: {...} } 或根级平铺 */
        function pickMissingGeoDataPayload(json) {
          if (!json || typeof json !== 'object') return null
          if (json.data && typeof json.data === 'object' && !Array.isArray(json.data)) return json.data
          if (json.result && typeof json.result === 'object' && !Array.isArray(json.result)) return json.result
          return json
        }

        function parseGetMissingGeoJson(json) {
          if (!json || typeof json !== 'object') {
            return { warehouses: [], smelters: [], summary: null }
          }
          const inner = pickMissingGeoDataPayload(json) || {}
          const root = json
          const warehouses = Array.isArray(inner.warehouses)
            ? inner.warehouses
            : Array.isArray(root.warehouses)
              ? root.warehouses
              : []
          const smelters = Array.isArray(inner.smelters)
            ? inner.smelters
            : Array.isArray(root.smelters)
              ? root.smelters
              : []
          let summary = null
          if (inner.summary && typeof inner.summary === 'object') {
            summary = inner.summary
          } else if (root.summary && typeof root.summary === 'object') {
            summary = root.summary
          }
          return { warehouses, smelters, summary }
        }

        function summaryNum(s, key) {
          if (!s || s[key] == null || s[key] === '') return null
          const n = Number(s[key])
          return Number.isFinite(n) ? n : null
        }

        /** 详情页三张卡：有 summary 字段就用接口数字，可只填其中部分 */
        function applyMissingGeoSummaryToCards(summary, whCount, smCount, totalCount, whRows, smRows) {
          const w = summaryNum(summary, 'warehouses')
          const s = summaryNum(summary, 'smelters')
          const t = summaryNum(summary, 'total')
          if (w != null && whCount) whCount.textContent = String(w)
          else if (whCount) whCount.textContent = String(whRows.length)
          if (s != null && smCount) smCount.textContent = String(s)
          else if (smCount) smCount.textContent = String(smRows.length)
          if (t != null && totalCount) totalCount.textContent = String(t)
          else if (totalCount) totalCount.textContent = String(whRows.length + smRows.length)
        }

        }

        function copyNumberIfPresent(payload, full, toKey, fromKeys) {
          if (full == null) return
          for (const k of fromKeys) {
            if (!(k in full) || full[k] === null || full[k] === '') continue
            const n = Number(full[k])
            if (Number.isFinite(n)) {
              payload[toKey] = n
              return
            }
          }
        }

        function copyOptionalStringFieldsFromFull(payload, full, keys) {
          for (const k of keys) {
            if (full == null) continue
            if (!(k in full)) continue
            const v = full[k]
            if (v == null) continue
            if (typeof v === 'string' && v.trim() === '') continue
            payload[k] = v
          }

        /** 仅用户可改弹窗里展示的项；其余从完整记录带过去；经纬度只透传。 */
        function buildWarehouseUpdatePayload(full, prov, city, dist, extra) {
          extra = extra || {}
          const wid = pickNum(full, ['仓库id', 'id', 'warehouse_id'])
          if (!wid) throw new Error('记录缺少 仓库id')
          const typeIdFromFull = pickNum(full, ['仓库类型id', '类型id', 'warehouse_type_id', 'type_id'])
          let typeId = typeIdFromFull
          let typeName = (pick(full, ['类型', '库房类型名', '类型名', 'type_name', '仓库类型名']) || '').trim()
          if (Object.prototype.hasOwnProperty.call(extra, '仓库类型id')) {
            const tid = Number(extra['仓库类型id'])
            if (Number.isFinite(tid) && tid > 0) typeId = tid
          }
          if (Object.prototype.hasOwnProperty.call(extra, '库房类型名')) {
            const tn = String(extra['库房类型名'] ?? '').trim()
            if (tn) typeName = tn
          }
          const namePick = (pick(full, ['仓库名', '仓库', 'warehouse_name', 'name']) || '').trim()
          const addrPick = (pick(full, ['地址', 'address', '详细地址']) || '').trim()
          const name = Object.prototype.hasOwnProperty.call(extra, '仓库名')
            ? String(extra['仓库名'] ?? '').trim()
            : namePick
          const addr = Object.prototype.hasOwnProperty.call(extra, '地址')
            ? String(extra['地址'] ?? '').trim()
            : addrPick
          const payload = {
            仓库id: wid,
            仓库名: name,
            地址: addr,
            省: prov,
            市: city,
            区: dist,
          }
          if (typeId && typeId > 0) payload['仓库类型id'] = typeId
          if (typeName) {
            payload['类型'] = typeName
            payload['库房类型名'] = typeName
          }
          if (!payload['仓库类型id']) throw new Error('缺少库房类型，请选择库房类型')
          copyNumberIfPresent(payload, full, '经度', ['经度', 'lon', 'longitude', 'lng'])
          copyNumberIfPresent(payload, full, '纬度', ['纬度', 'lat', 'latitude'])
          copyOptionalStringFieldsFromFull(payload, full, [
            '库房类型颜色配置',
            '仓库颜色配置',
            '颜色配置',
          ])
          payload['库房联系人'] = Object.prototype.hasOwnProperty.call(extra, '库房联系人')
            ? String(extra['库房联系人'] ?? '').trim()
            : pick(full, ['库房联系人', '联系人']) || ''
          payload['电话'] = Object.prototype.hasOwnProperty.call(extra, '电话')
            ? String(extra['电话'] ?? '').trim()
            : pick(full, ['电话', '联系电话', '手机']) || ''
          ;['危废经营许可数量', '月均收货'].forEach((k) => {
            if (Object.prototype.hasOwnProperty.call(extra, k)) {
              const ev = extra[k]
              payload[k] = ev === '' || ev === undefined ? null : Number(ev)
              if (payload[k] !== null && !Number.isFinite(payload[k])) payload[k] = null
              return
            }
            if (!full || !Object.prototype.hasOwnProperty.call(full, k)) return
            const fv = full[k]
            if (fv === null || fv === '') {
              payload[k] = null
              return
            }
            const n = Number(fv)
            payload[k] = Number.isFinite(n) ? n : null
          })
          if (typeof full['is_active'] === 'boolean') {
            payload['is_active'] = full['is_active']
          } else {
            payload['is_active'] = true
          }
          return payload
        }

        function copyXunrongbaoShipIfPresent(payload, full) {
          if (!full || typeof full !== 'object') return
          const keys = ['循融宝发货', 'xunrongbao_ship', 'xrb_ship']
          for (const k of keys) {
            if (!(k in full)) continue

        }

        function abnormalFindProvinceNode(name) {
          const n = (name || '').trim()
          if (!n || !abnormalPcaData) return null
          const hit = abnormalPcaData.find((p) => p.name === n)
          if (hit) return hit
          return abnormalPcaData.find((p) => n.includes(p.name) || p.name.includes(n)) || null
        }

        function abnormalFindCityNode(provNode, cityName) {
          const c = (cityName || '').trim()
          if (!provNode || !Array.isArray(provNode.children) || !c) return null
          const hit = provNode.children.find((x) => x.name === c)
          if (hit) return hit
          return provNode.children.find((x) => c.includes(x.name) || x.name.includes(c)) || null
        }

        function getAbnormalProvinceNodeExact(name) {
          const n = (name || '').trim()
          if (!n || !abnormalPcaData) return null
          return abnormalPcaData.find((p) => p.name === n) || null
        }

        function getAbnormalCityNodeExact(provNode, cityName) {
          const c = (cityName || '').trim()
          if (!provNode || !Array.isArray(provNode.children) || !c) return null
          return provNode.children.find((x) => x.name === c) || null
        }

        function isAbnormalProvinceStandard(name) {
          return !!(name || '').trim() && !!getAbnormalProvinceNodeExact(name)
        }

        function isAbnormalCityStandard(provName, cityName) {
          const c = (cityName || '').trim()
          if (!c) return true
          const pn = getAbnormalProvinceNodeExact(provName)
          if (!pn) return false
          return !!getAbnormalCityNodeExact(pn, c)
        }

        function isAbnormalDistStandard(provName, cityName, distName) {
          const d = (distName || '').trim()
          if (!d) return true
          const pn = getAbnormalProvinceNodeExact(provName)
          const cn = getAbnormalCityNodeExact(pn, cityName)
          if (!cn || !Array.isArray(cn.children)) return false
          return cn.children.some((x) => x.name === d)
        }

          const cv = (sc.value || '').trim()

          sp.classList.remove('region-pcd-conflict')
          sc.classList.remove('region-pcd-conflict')

          }
          if (abnormalPcdRowIsVisible('abnormal-row-city') && pv && cv && !isAbnormalCityStandard(pv, cv)) {

            any = true
          }
          if (

            pv &&
            cv &&
            dv &&
            !isAbnormalDistStandard(pv, cv, dv)
          ) {
            sd.classList.add('region-pcd-conflict')
            any = true
          }
          if (tip) tip.style.display = any ? 'block' : 'none'
        }

          const cityNames = provNode && Array.isArray(provNode.children) ? provNode.children.map((c) => c.name) : []
          abnormalFillSelectOptions(sc, '请选择市', cityNames, pcd.city)
          sc.disabled = !!(pcd.city || '').trim()

          const cv = (pcd.city || '').trim() || (sc.value || '').trim()
          const cityNode = abnormalFindCityNode(provNode, cv)
          const distNames =
            cityNode && Array.isArray(cityNode.children) ? cityNode.children.map((d) => d.name) : []
          abnormalFillSelectOptions(sd, '请选择区/县', distNames, pcd.dist)
          sd.disabled = !!(pcd.dist || '').trim()
        }

        function wireAbnormalPcdCascadesOnce() {
          if (abnormalPcdCascadeWired) return
          abnormalPcdCascadeWired = true
          const sp = document.getElementById('abnormal-in-prov')
          const sc = document.getElementById('abnormal-in-city')
          const sd = document.getElementById('abnormal-in-dist')
          if (!sp || !sc || !sd) return
          sp.addEventListener('change', () => {
            if (sp.disabled || !abnormalPcaData) return
            const provNode = abnormalFindProvinceNode(sp.value)
            const cityNames = provNode && Array.isArray(provNode.children) ? provNode.children.map((c) => c.name) : []
            abnormalFillSelectOptions(sc, '请选择市', cityNames, '')
            sc.disabled = false
            abnormalFillSelectOptions(sd, '请选择区/县', [], '')
            sd.disabled = false
            abnormalUpdatePcdConflictUi()
          })
          sc.addEventListener('change', () => {
            if (sc.disabled || !abnormalPcaData) return
            const provNode = abnormalFindProvinceNode(sp.value)
            const cityNode = abnormalFindCityNode(provNode, sc.value)
            const distNames =
              cityNode && Array.isArray(cityNode.children) ? cityNode.children.map((d) => d.name) : []
            abnormalFillSelectOptions(sd, '请选择区/县', distNames, '')
            sd.disabled = false
            abnormalUpdatePcdConflictUi()
          })
          sd.addEventListener('change', () => {
            abnormalUpdatePcdConflictUi()
          })
        }

        async function openAbnormalEdit(kind, idKey) {
          const row = kind === 'wh' ? abnormalWhCache.get(idKey) : abnormalSmCache.get(idKey)
          if (!row) return
          abnormalEdit = { kind, idKey }
          const pcd = getPcd(row)
          const id =
            kind === 'wh'
              ? pick(row, ['仓库id', 'id', 'warehouse_id'])
              : pick(row, ['冶炼厂id', 'id', 'factory_id'])
          const name =
            kind === 'wh'
              ? pick(row, ['仓库名', '仓库', 'warehouse_name', 'name'])
              : pick(row, ['冶炼厂', '冶炼厂名', 'factory_name', 'name'])
          const title = document.getElementById('abnormal-edit-title')
          const meta = document.getElementById('abnormal-edit-meta')
          if (title) title.textContent = kind === 'wh' ? '补全经纬度信息' : '补全经纬度信息'
          if (meta) meta.textContent = `ID: ${id} ｜ ${name || ''}`

          hideAllAbnormalKindSpecificRows()
          if (kind === 'wh') {
            syncAbnormalWhExtraRows(row)
            if (abnormalRowVisible('abnormal-row-wh-type')) {
              try {
                await ensureAbnormalWarehouseTypeOptions()
              } catch (e) {
                alert(e instanceof Error ? e.message : String(e))
              }
            }
          } else syncAbnormalSmExtraRows(row)

          try {
            await ensureAbnormalPcaLoaded()
          } catch (e) {
            alert(e instanceof Error ? e.message : String(e))
            return
          }
          abnormalRefreshPcdSelects(pcd)
          syncAbnormalPcdRowVisibility(pcd)
          abnormalUpdatePcdConflictUi()
          const ov = document.getElementById('abnormal-edit-overlay')
          if (ov) ov.style.display = 'flex'
        }

        async function saveAbnormalEdit() {
          const { kind, idKey } = abnormalEdit
          if (!kind || !idKey) return
          const row = kind === 'wh' ? abnormalWhCache.get(idKey) : abnormalSmCache.get(idKey)
          if (!row) {
            closeAbnormalEdit()
            return
          }
          const pcd = getPcd(row)
          const inP = document.getElementById('abnormal-in-prov')
          const inC = document.getElementById('abnormal-in-city')
          const inD = document.getElementById('abnormal-in-dist')
          const read = (el, orig) => {
            const locked = el && (el.hasAttribute('readonly') || el.disabled === true)
            if (locked) return (orig || '').trim() || String(el.value || '').trim()
            return (el && el.value ? String(el.value).trim() : '') || (orig || '').trim()
          }
          const prov = read(inP, pcd.prov)
          const city = read(inC, pcd.city)
          const dist = read(inD, pcd.dist)
          if (!(prov && city && dist)) {
            alert('请从下拉列表中选择并补全页面上展示的空白省/市/区项，保存需省、市、区均有效')
            return
          }
          if (
            !isAbnormalProvinceStandard(prov) ||
            !isAbnormalCityStandard(prov, city) ||
            !isAbnormalDistStandard(prov, city, dist)
          ) {
            alert('省/市/区与标准行政区划不一致（见红色边框），请从下拉中改选标准项后再保存')
            return
          }
          const saveBtn = document.getElementById('abnormal-edit-save')
          const oldText = saveBtn && saveBtn.textContent
          if (saveBtn) {
            saveBtn.disabled = true
            saveBtn.textContent = '保存中...'
          }
          try {
            if (kind === 'wh') {
              const wid = pickNum(row, ['仓库id', 'id', 'warehouse_id'])
              if (!wid) throw new Error('缺少仓库 ID')
              const fetched = await fetchFullWarehouseById(wid)
              const full = fetched ? Object.assign({}, row, fetched) : row
              const extraWh = {}
              if (abnormalRowVisible('abnormal-row-wh-name')) {
                const v = document.getElementById('abnormal-in-wh-name')?.value?.trim()
                if (!v) throw new Error('请填写仓库名')
                extraWh['仓库名'] = v
              }
              if (abnormalRowVisible('abnormal-row-wh-addr')) {
                const v = document.getElementById('abnormal-in-wh-addr')?.value?.trim()
                if (!v) throw new Error('请填写地址')
                extraWh['地址'] = v
              }
              if (abnormalRowVisible('abnormal-row-wh-type')) {
                const sel = document.getElementById('abnormal-in-wh-type')
                const tid = Number(sel?.value || '')
                if (!Number.isFinite(tid) || tid <= 0) throw new Error('请选择库房类型')
                extraWh['仓库类型id'] = tid
                const opt = sel?.selectedOptions?.[0]
                let tn = ((opt?.textContent || '').trim()).replace(/^\[停用\]\s*/, '')
                if (!tn && abnormalWarehouseTypesCache) {
                  const hit = abnormalWarehouseTypesCache.find(
                    (t) => pickNum(t, ['类型id', 'id', 'type_id', 'warehouse_type_id']) === tid,
                  )
                  if (hit) tn = pick(hit, ['类型名', 'name', '类型名称', 'type_name']) || ''
                }
                if (tn) extraWh['库房类型名'] = tn
              }
              if (abnormalRowVisible('abnormal-row-lat')) {
                const latVal = parseFloat(document.getElementById('abnormal-in-lat')?.value)
                if (isNaN(latVal) || latVal < -90 || latVal > 90) throw new Error('纬度须为 -90 到 90 之间的数字')
                extraWh['纬度'] = latVal
              }
              if (abnormalRowVisible('abnormal-row-lng')) {
                const lngVal = parseFloat(document.getElementById('abnormal-in-lng')?.value)
                if (isNaN(lngVal) || lngVal < -180 || lngVal > 180) throw new Error('经度须为 -180 到 180 之间的数字')
                extraWh['经度'] = lngVal
              }
              const payload = buildWarehouseUpdatePayload(full, prov, city, dist, extraWh)
              if (Object.prototype.hasOwnProperty.call(extraWh, '纬度')) payload['纬度'] = extraWh['纬度']
              if (Object.prototype.hasOwnProperty.call(extraWh, '经度')) payload['经度'] = extraWh['经度']
              await postAbnormalJson('/tl/update_warehouse', payload)
            } else {
              const sid = pickNum(row, ['冶炼厂id', 'id', 'factory_id'])
              if (!sid) throw new Error('缺少冶炼厂 ID')
              const fetched = await fetchFullSmelterById(sid)
              const full = fetched ? Object.assign({}, row, fetched) : row
              const extraSm = {}
              if (abnormalRowVisible('abnormal-row-sm-name')) {
                const v = document.getElementById('abnormal-in-sm-name')?.value?.trim()
                if (!v) throw new Error('请填写冶炼厂名')
                extraSm['冶炼厂名'] = v
              }
              if (abnormalRowVisible('abnormal-row-sm-addr')) {
                const v = document.getElementById('abnormal-in-sm-addr')?.value?.trim()
                if (!v) throw new Error('请填写地址')
                extraSm['地址'] = v
              }
              if (abnormalRowVisible('abnormal-row-sm-xrb')) {
                extraSm['循融宝发货'] = !!document.getElementById('abnormal-in-sm-xrb')?.checked
              }
              if (abnormalRowVisible('abnormal-row-sm-active')) {
                extraSm['is_active'] = !!document.getElementById('abnormal-in-sm-active')?.checked
              }
              if (abnormalRowVisible('abnormal-row-lat')) {
                const latVal = parseFloat(document.getElementById('abnormal-in-lat')?.value)
                if (isNaN(latVal) || latVal < -90 || latVal > 90) throw new Error('纬度须为 -90 到 90 之间的数字')
                extraSm['纬度'] = latVal
              }
              if (abnormalRowVisible('abnormal-row-lng')) {
                const lngVal = parseFloat(document.getElementById('abnormal-in-lng')?.value)
                if (isNaN(lngVal) || lngVal < -180 || lngVal > 180) throw new Error('经度须为 -180 到 180 之间的数字')
                extraSm['经度'] = lngVal
              }
              const payload = buildSmelterUpdatePayload(full, prov, city, dist, extraSm)
              if (Object.prototype.hasOwnProperty.call(extraSm, '纬度')) payload['纬度'] = extraSm['纬度']
              if (Object.prototype.hasOwnProperty.call(extraSm, '经度')) payload['经度'] = extraSm['经度']
              await postAbnormalJson('/tl/update_smelter', payload)
            }
            closeAbnormalEdit()
            await loadAbnormalData()
          } catch (e) {
            alert(e instanceof Error ? e.message : String(e))
          } finally {
            if (saveBtn) {
              saveBtn.disabled = false
              saveBtn.textContent = oldText || '保存'
            }
          }
        }

        function bindAbnormalModalOnce() {
          if (abnormalModalBound) return
          const ov = document.getElementById('abnormal-edit-overlay')
          if (!ov) return
          abnormalModalBound = true
          wireAbnormalPcdCascadesOnce()
          document.getElementById('abnormal-edit-close')?.addEventListener('click', closeAbnormalEdit)
          document.getElementById('abnormal-edit-cancel')?.addEventListener('click', closeAbnormalEdit)
          document.getElementById('abnormal-edit-save')?.addEventListener('click', () => {
            void saveAbnormalEdit()
          })
          ov.addEventListener('click', (e) => {
            if (e.target === ov) closeAbnormalEdit()
          })
          document.addEventListener('click', (e) => {
            const b = e.target && e.target.closest && e.target.closest('.abnormal-edit-btn')
            if (!b) return
            e.preventDefault()
            const k = b.getAttribute('data-kind') || ''
            const idk = b.getAttribute('data-id') || ''
            if (!idk) return
            if (k === 'wh' || k === 'sm') void openAbnormalEdit(k, idk)
          })
        }

        async function loadAbnormalData() {
          const whBody = document.getElementById('abnormal-warehouse-tbody')
          const smBody = document.getElementById('abnormal-smelter-tbody')
          const whCount = document.getElementById('abnormal-wh-count')
          const smCount = document.getElementById('abnormal-sm-count')
          const totalCount = document.getElementById('abnormal-total-count')
          if (!whBody || !smBody) return
          whBody.innerHTML = '<tr><td colspan="7">加载中...</td></tr>'
          smBody.innerHTML = '<tr><td colspan="6">加载中...</td></tr>'
          bindAbnormalModalOnce()
          try {
            const res = await fetch('/tl/get_missing_geo_info?include_inactive=false', {
              credentials: 'same-origin',
            })
            if (!res.ok) throw new Error(`HTTP ${res.status}`)
            const text = await res.text()
            let json = null
            try {
              json = text ? JSON.parse(text) : null
            } catch (e) {
              throw new Error('响应非 JSON')
            }
            const { warehouses, smelters, summary } = parseGetMissingGeoJson(json)

            abnormalWhCache.clear()
            abnormalSmCache.clear()

            const { whRows, smRows } = filterAbnormalPcdRows(warehouses, smelters)
            applyMissingGeoSummaryToCards(summary, whCount, smCount, totalCount, whRows, smRows)

            whBody.innerHTML = whRows.length
              ? whRows
                  .map((row) => {
                    const id = pickNum(row, ['仓库id', 'id', 'warehouse_id'])
                    const idKey = id ? String(id) : ''
                    if (idKey) abnormalWhCache.set(idKey, row)
                    const name = pick(row, ['仓库名', '仓库', 'warehouse_name', 'name']) || '-'
                    const addr = pick(row, ['地址', 'address', '详细地址']) || '-'
                    const type = pick(row, ['类型', '库房类型名', '仓库类型名', 'type_name']) || '-'
                    const line = pcdLine(getPcd(row))
                    const missing = getMissingFieldsText(row)
                    const btn = idKey
                      ? `<button type="button" class="btn btn-sm btn-primary abnormal-edit-btn" data-kind="wh" data-id="${esc(
                          idKey,
                        )}">更改</button>`
                      : '—'
                    return `<tr><td>${esc(id || '—')}</td><td>${esc(name)}</td><td>${esc(addr)}</td><td>${esc(
                      line,
                    )}</td><td>${esc(type)}</td><td style="color:#dc2626;font-weight:600;">${esc(missing)}</td><td>${btn}</td></tr>`
                  })
                  .join('')
              : '<tr><td colspan="7">暂无异常仓库数据</td></tr>'

            smBody.innerHTML = smRows.length
              ? smRows
                  .map((row) => {
                    const id = pickNum(row, ['冶炼厂id', 'id', 'factory_id'])
                    const idKey = id ? String(id) : ''
                    if (idKey) abnormalSmCache.set(idKey, row)
                    const name = pick(row, ['冶炼厂', '冶炼厂名', 'factory_name', 'name']) || '-'
                    const addr = pick(row, ['地址', 'address', '详细地址']) || '-'
                    const line = pcdLine(getPcd(row))
                    const missing = getMissingFieldsText(row)
                    const btn = idKey
                      ? `<button type="button" class="btn btn-sm btn-primary abnormal-edit-btn" data-kind="sm" data-id="${esc(
                          idKey,
                        )}">更改</button>`
                      : '—'
                    return `<tr><td>${esc(id || '—')}</td><td>${esc(name)}</td><td>${esc(addr)}</td><td>${esc(
                      line,
                    )}</td><td style="color:#dc2626;font-weight:600;">${esc(missing)}</td><td>${btn}</td></tr>`
                  })
                  .join('')
              : '<tr><td colspan="6">暂无异常冶炼厂数据</td></tr>'
          } catch (err) {
            const msg = err instanceof Error ? err.message : String(err)
            whBody.innerHTML = `<tr><td colspan="7">加载失败：${esc(msg)}</td></tr>`
            smBody.innerHTML = `<tr><td colspan="6">加载失败：${esc(msg)}</td></tr>`
          }
        }

        function ensureModuleCard() {
          const cards = Array.from(document.querySelectorAll('.home-page .module-cards'))
          if (!cards.length) return
          const backendCards = cards[0]
          if (!backendCards || backendCards.querySelector(`.module-card[data-page="${PAGE_KEY}"]`)) return
          const card = document.createElement('div')
          card.className = 'module-card module-card--abnormal'
          card.setAttribute('data-page', PAGE_KEY)
          card.innerHTML = `
            <div class="module-icon"><i class="fas fa-triangle-exclamation"></i></div>
            <div class="module-info">
              <h4>异常数据</h4>
              <p>补全仓库/冶炼厂省市区及经纬度</p>
            </div>
          `
          backendCards.appendChild(card)
        }

        function bindPageLifecycle() {
          document.addEventListener('click', (evt) => {
            const card = evt.target.closest(`.module-card[data-page="${PAGE_KEY}"]`)
            if (!card) return
            setTimeout(() => {
              loadAbnormalData()
              const btn = document.getElementById('abnormal-refresh-btn')
              if (btn && !btn.dataset.bound) {
                btn.dataset.bound = '1'
                btn.addEventListener('click', () => loadAbnormalData())
              }
            }, 0)
          })
        }

        function start() {
          ensureTemplate()
          bindAbnormalModalOnce()
          bindPageLifecycle()
          const mo = new MutationObserver(() => ensureModuleCard())
          mo.observe(document.body, { childList: true, subtree: true })
          ensureModuleCard()
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', start)
        } else {
          start()
        }
      })()
    </script>
